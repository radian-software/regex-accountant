<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>regex_accountant</title>
    <link rel="stylesheet" href="/styles/accountant.css" />
  </head>
  <body class="mx-10 my-5">
    <h1 class="text-2xl">Transactions</h1>
    <table class="my-5">
      <thead class="bg-gray-50">
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Account</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        {% for txn in txns %}
        <tr class="border-b">
          <td>{{ txn.date_posted.strftime('%Y-%m-%d') }}</td>
          <td>{{ txn.amount }} {{ txn.currency }}</td>
          <td>{{ txn.account }}</td>
          <td>{{ txn.summary }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
