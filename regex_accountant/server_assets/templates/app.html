<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>regex_accountant</title>
  </head>
  <body>
    <h1>Transactions</h1>
    <table>
      <thead>
        <th>
          <td>Date</td>
          <td>Amount</td>
          <td>Account</td>
          <td>Description</td>
        </th>
      </thead>
      <tbody>
        {% for txn in txns %}
        <tr>
          <td>{{ txn.date_posted.strftime('%Y-%m-%d') }}</td>
          <td>{{ txn.amount }} {{ txn.currency }}</td>
          <td>{{ txn.account }}</td>
          <td>{{ txn.description }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
