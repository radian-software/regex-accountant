<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>regex_accountant</title>
    <link rel="stylesheet" href="/styles/accountant.css" />
  </head>
  <body class="mx-10 my-5">
    <h1 class="text-2xl">Transactions</h1>
    <form class="mt-2 flex">
      <input
        type="submit"
        value="Query"
        class="border border-gray-300 p-1 px-3 mr-5"
      />
      <input
        type="text"
        name="q"
        class="border border-gray-300 font-mono p-2 w-full"
        rows="1"
        placeholder="Query transactions"
        value="{{ query }}"
        autofocus
        onfocus="this.oldValue = this.value; this.value = ''; this.value = this.oldValue;"
      />
    </form>
    <div class="table my-5 border border-gray-300 border-collapse">
      <div class="table-header-group bg-gray-300">
        <div class="table-row">
          <div class="table-cell p-1">Date</div>
          <div class="table-cell p-1">Amount</div>
          <div class="table-cell p-1">Source</div>
          <div class="table-cell p-1">Description</div>
        </div>
      </div>
      <div class="table-row-group">
        {% for txn in txns %}
        <a
          href="/txn/{{ txn.account }}/{{ txn.source_uid }}"
          class="table-row border border-gray-300"
        >
          <div class="table-cell px-2 py-1">
            {{ txn.date_posted.strftime('%Y-%m-%d') }}
          </div>
          <div class="table-cell px-2 py-1 text-right text-nowrap">
            {{ txn.amount.__str__().replace('-', '−') }} {{ txn.currency }}
          </div>
          <div class="table-cell px-2 py-1">{{ txn.account }}</div>
          <div class="table-cell px-2 py-1">{{ redact(txn.summary) }}</div>
        </a>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
